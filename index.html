<!DOCTYPE html><html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Envelope de Amor</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
.heart {
  position: absolute;
  width: 20px;
  height: 20px;
  background: red;
  transform: rotate(45deg);
  animation: float 6s infinite;
  opacity: 0.7;
}

.heart::before,
.heart::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  background: red;
  border-radius: 50%;
}

.heart::before {
  top: -10px;
  left: 0;
}

.heart::after {
  left: -10px;
  top: 0;
}

@keyframes float {
  0% { transform: translateY(100vh) rotate(45deg); }
  100% { transform: translateY(-10vh) rotate(45deg); }
}

.envelope {
  position: relative;
  width: 300px;
  height: 200px;
  background: #fff;
  border-radius: 10px;
  cursor: pointer;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ff6b81;
  clip-path: polygon(0 0, 50% 50%, 100% 0);
  transform-origin: top;
  transition: 0.6s;
  z-index: 2;
}

.letter {
  position: absolute;
  width: 90%;
  height: 90%;
  background: #fff;
  top: 5%;
  left: 5%;
  border-radius: 10px;
  padding: 15px;
  box-sizing: border-box;
  transform: translateY(100%);
  transition: 0.6s;
  text-align: center;
  overflow-y: auto;
}

.open .flap {
  transform: rotateX(180deg);
}

.open .letter {
  transform: translateY(0);
}

h2 {
  margin-top: 0;
  color: #ff6b81;
}

  </style>
</head>
<body><div class="envelope" onclick="openEnvelope(this)">
  <div class="flap"></div>
  <div class="letter">
    <h2>Meu Amor 💖</h2>
    <p>
      Eu só queria te lembrar o quanto você é importante pra mim.
      Você ilumina meus dias, faz tudo ficar mais leve e bonito.
      Cada momento ao seu lado é especial e eu sou muito feliz por ter você.Eu te amo mais do que palavras conseguem explicar.
  💕
</p>

  </div>
</div><audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio><script>
  function openEnvelope(el) {
    el.classList.toggle('open');
  }

  for (let i = 0; i < 30; i++) {
    let heart = document.createElement('div');
    heart.className = 'heart';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
    document.body.appendChild(heart);
  }
</script></body>
</html>
